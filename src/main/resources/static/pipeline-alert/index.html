<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流水线告警策略配置</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">DevOps 流水线管理</h1>
                <nav class="header-nav">
                    <a href="#" class="nav-item">并发看板</a>
                    <a href="#" class="nav-item">排队看板</a>
                    <a href="#" class="nav-item active">告警策略</a>
                    <a href="#" class="nav-item">告警记录</a>
                </nav>
            </div>
            <div class="header-right">
                <span class="alert-badge" id="activeAlertCount">3 条活跃告警</span>
            </div>
        </header>

        <main class="main-content">
            <!-- 告警概览卡片 -->
            <section class="overview-cards">
                <div class="card card-warning">
                    <div class="card-icon">&#9888;</div>
                    <div class="card-info">
                        <span class="card-value" id="queueAlertCount">2</span>
                        <span class="card-label">排队预警</span>
                    </div>
                </div>
                <div class="card card-critical">
                    <div class="card-icon">&#9889;</div>
                    <div class="card-info">
                        <span class="card-value" id="timeoutAlertCount">1</span>
                        <span class="card-label">超时告警</span>
                    </div>
                </div>
                <div class="card card-info">
                    <div class="card-icon">&#9881;</div>
                    <div class="card-info">
                        <span class="card-value" id="strategyCount">6</span>
                        <span class="card-label">策略总数</span>
                    </div>
                </div>
                <div class="card card-success">
                    <div class="card-icon">&#10003;</div>
                    <div class="card-info">
                        <span class="card-value" id="enabledCount">4</span>
                        <span class="card-label">已启用</span>
                    </div>
                </div>
            </section>

            <!-- 策略列表 -->
            <section class="strategy-section">
                <div class="section-header">
                    <h2>告警策略列表</h2>
                    <div class="section-actions">
                        <input type="text" class="search-input" placeholder="搜索策略名称..." id="searchInput">
                        <button class="btn btn-primary" onclick="openModal()">+ 新建策略</button>
                    </div>
                </div>

                <table class="strategy-table">
                    <thead>
                        <tr>
                            <th>策略名称</th>
                            <th>告警类型</th>
                            <th>触发条件</th>
                            <th>告警级别</th>
                            <th>通知方式</th>
                            <th>静默期</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="strategyTableBody">
                        <!-- 由 JS 动态渲染 -->
                    </tbody>
                </table>
            </section>
        </main>

        <!-- 新建/编辑策略弹窗 -->
        <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
            <div class="modal" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3 id="modalTitle">新建告警策略</h3>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <form class="modal-body" id="strategyForm" onsubmit="saveStrategy(event)">
                    <!-- 基本信息 -->
                    <div class="form-section">
                        <h4 class="form-section-title">基本信息</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label>策略名称 <span class="required">*</span></label>
                                <input type="text" id="strategyName" required placeholder="例如：排队超时预警">
                            </div>
                            <div class="form-group">
                                <label>告警级别 <span class="required">*</span></label>
                                <select id="alertLevel" required>
                                    <option value="">请选择</option>
                                    <option value="info">Info - 通知</option>
                                    <option value="warning">Warning - 警告</option>
                                    <option value="critical">Critical - 严重</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>策略描述</label>
                            <textarea id="strategyDesc" rows="2" placeholder="描述该策略的用途和触发场景"></textarea>
                        </div>
                    </div>

                    <!-- 触发条件 -->
                    <div class="form-section">
                        <h4 class="form-section-title">触发条件</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label>告警类型 <span class="required">*</span></label>
                                <select id="alertType" required onchange="updateConditionUI()">
                                    <option value="">请选择</option>
                                    <option value="queue_timeout">排队超时</option>
                                    <option value="queue_depth">排队深度(积压)</option>
                                    <option value="run_timeout">运行超时</option>
                                    <option value="continuous_fail">连续失败</option>
                                    <option value="resource_exhausted">资源耗尽</option>
                                    <option value="queue_cancelled">排队自动取消</option>
                                </select>
                            </div>
                            <div class="form-group" id="thresholdGroup">
                                <label id="thresholdLabel">阈值 <span class="required">*</span></label>
                                <div class="input-with-unit">
                                    <input type="number" id="thresholdValue" min="1" required placeholder="10">
                                    <span class="input-unit" id="thresholdUnit">分钟</span>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>适用流水线</label>
                            <div class="pipeline-selector">
                                <label class="radio-label">
                                    <input type="radio" name="pipelineScope" value="all" checked> 全部流水线
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="pipelineScope" value="selected"> 指定流水线
                                </label>
                            </div>
                            <input type="text" id="pipelineFilter" placeholder="输入流水线名称筛选..." class="pipeline-filter-input" style="display:none">
                        </div>
                    </div>

                    <!-- 通知配置 -->
                    <div class="form-section">
                        <h4 class="form-section-title">通知配置</h4>
                        <div class="form-group">
                            <label>通知方式 <span class="required">*</span></label>
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="notifyMethod" value="dingtalk" checked> 钉钉群通知
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="notifyMethod" value="email"> 邮件通知
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="notifyMethod" value="webhook"> Webhook
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="notifyMethod" value="sms"> 短信通知
                                </label>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>通知对象</label>
                                <select id="notifyTarget">
                                    <option value="owner">流水线负责人</option>
                                    <option value="committer">代码提交者</option>
                                    <option value="admin">项目管理员</option>
                                    <option value="ops">运维团队</option>
                                    <option value="custom">自定义成员</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>静默期</label>
                                <div class="input-with-unit">
                                    <input type="number" id="silencePeriod" min="0" value="30" placeholder="30">
                                    <span class="input-unit">分钟</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存策略</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
